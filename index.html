<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1428">
<title>ศูนย์ข้อมูลการป้องกันและปราบปรามผู้มีอิทธิพล จังหวัดหนองบัวลำภู</title>
<link rel="icon" href="province-seal.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ผู้มีอิทธิพล นภ.">
<link rel="apple-touch-icon" href="province-seal.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a1428; --bg2:#0e1d3a; --panel:rgba(20,36,68,.62); --panel2:rgba(15,28,56,.85);
  --stroke:rgba(120,170,255,.16); --txt:#eaf1ff; --muted:#9fb4d8;
  --gold:#f5c451; --cyan:#3fd0ff; --red:#ff5a6e; --yellow:#ffcb47; --green:#34e3a4;
  --shadow:0 18px 50px rgba(0,0,0,.45);
}
[data-theme="light"]{
  --bg:#eef3fb; --bg2:#dfe8f6; --panel:rgba(255,255,255,.82); --panel2:rgba(255,255,255,.95);
  --stroke:rgba(20,60,130,.14); --txt:#11203c; --muted:#566787; --shadow:0 16px 40px rgba(20,50,110,.14);
}
/* readable accent text on light background */
[data-theme="light"] .brand-sub b{color:#a8740d}
[data-theme="light"] .verdict.warn .vmain b,[data-theme="light"] .verdict.alert .vmain b{color:#a8740d}
[data-theme="light"] .kpi.gold .k-num{color:#b3800f}
[data-theme="light"] .kpi.cyan .k-num{color:#137fb8}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Sarabun','Kanit',sans-serif; color:var(--txt);
  background:
     radial-gradient(1100px 600px at 12% -8%, rgba(63,208,255,.16), transparent 60%),
     radial-gradient(1000px 560px at 95% 6%, rgba(245,196,81,.14), transparent 55%),
     linear-gradient(160deg,var(--bg),var(--bg2));
  background-attachment:fixed; min-height:100vh; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1280px;margin:0 auto;padding:18px 16px 60px}
h1,h2,h3,.k-num,.brand-title{font-family:'Kanit',sans-serif}

/* ---------- Header ---------- */
.top{display:flex;gap:16px;align-items:center;flex-wrap:wrap;
  background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--stroke);
  border-radius:22px;padding:16px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.top:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(245,196,81,.08),transparent 40%);pointer-events:none}
.logos{display:flex;gap:10px;align-items:center}
.logos img{height:58px;width:auto;filter:drop-shadow(0 4px 10px rgba(0,0,0,.35))}
.brand{flex:1;min-width:220px}
.brand-title{font-size:1.32rem;font-weight:700;line-height:1.2;letter-spacing:.2px}
.brand-sub{color:var(--muted);font-size:.86rem;margin-top:3px}
.brand-sub b{color:var(--gold)}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{cursor:pointer;border:1px solid var(--stroke);background:var(--panel2);color:var(--txt);
  font-family:'Kanit';font-size:.85rem;padding:9px 14px;border-radius:12px;display:inline-flex;gap:7px;align-items:center;
  transition:.18s transform,.18s box-shadow,.18s background}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.28)}
.btn.gold{background:linear-gradient(135deg,#f5c451,#e0a32e);color:#2a1d00;border:none;font-weight:600}
.btn.cyan{background:linear-gradient(135deg,#3fd0ff,#1f9ed6);color:#022235;border:none;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(52,227,164,.18)}
.status-pill{display:inline-flex;gap:8px;align-items:center;font-size:.78rem;color:var(--muted);
  border:1px solid var(--stroke);border-radius:999px;padding:6px 12px;background:var(--panel2)}

/* ---------- Filters ---------- */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.72rem;color:var(--muted);padding-left:4px}
select{font-family:'Sarabun';font-size:.9rem;color:var(--txt);background:var(--panel2);
  border:1px solid var(--stroke);border-radius:12px;padding:9px 12px;min-width:150px;cursor:pointer}
select:focus{outline:2px solid var(--cyan)}

/* ---------- Verdict hero ---------- */
.verdict{margin-top:16px;border-radius:22px;padding:22px 24px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(52,227,164,.16),rgba(63,208,255,.08));
  border:1px solid rgba(52,227,164,.30);box-shadow:var(--shadow)}
.verdict.warn{background:linear-gradient(135deg,rgba(255,203,71,.18),rgba(255,90,110,.08));border-color:rgba(255,203,71,.34)}
.verdict.alert{background:linear-gradient(135deg,rgba(255,90,110,.20),rgba(255,90,110,.06));border-color:rgba(255,90,110,.4)}
.verdict .vlabel{font-size:.8rem;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.verdict .vmain{font-family:'Kanit';font-size:1.5rem;font-weight:700;margin-top:6px;line-height:1.35}
.verdict .vmain b{color:var(--green)}
.verdict.warn .vmain b,.verdict.alert .vmain b{color:var(--gold)}
.verdict .vsub{color:var(--muted);margin-top:8px;font-size:.92rem}
.copybtn{position:absolute;top:16px;right:16px}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:16px}
.kpi{background:var(--panel);backdrop-filter:blur(12px);border:1px solid var(--stroke);
  border-radius:18px;padding:16px 16px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi:after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,var(--accent,rgba(63,208,255,.25)),transparent 70%)}
.kpi .klabel{font-size:.82rem;color:var(--muted)}
.kpi .k-num{font-size:2.05rem;font-weight:800;margin-top:6px;line-height:1}
.kpi .kunit{font-size:.85rem;color:var(--muted);font-weight:400;margin-left:4px}
.kpi .ktag{font-size:.74rem;margin-top:8px;color:var(--muted)}
.kpi.red .k-num{color:var(--red)} .kpi.yellow .k-num{color:var(--yellow)}
.kpi.green .k-num{color:var(--green)} .kpi.cyan .k-num{color:var(--cyan)} .kpi.gold .k-num{color:var(--gold)}

/* ---------- Grid panels ---------- */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
/* ผังแผนที่: แผนที่สูงกินซ้าย 2 แถว ขวาซ้อนมาตรวัด+โดนัท ให้สมดุลกัน */
.grid-map{display:grid;grid-template-columns:1.1fr 1fr;gap:14px;margin-top:14px}
.grid-map .mapcard{grid-row:span 2}
.card.vc{display:flex;flex-direction:column}
.card.vc .vfill{flex:1;display:flex;flex-direction:column;justify-content:center}
.card.vc .chart-box{height:250px;width:100%;max-width:280px;flex:0 0 auto;margin:auto}
.chart-box.wide{height:300px}
.card{background:var(--panel);backdrop-filter:blur(12px);border:1px solid var(--stroke);
  border-radius:20px;padding:18px;box-shadow:var(--shadow)}
.card h3{font-size:1.02rem;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card h3 .bar{width:5px;height:18px;border-radius:3px;background:linear-gradient(var(--cyan),var(--gold))}
.card .desc{color:var(--muted);font-size:.8rem;margin-bottom:10px}
.chart-box{position:relative;height:280px}
.chart-box.tall{height:330px}

/* ---------- Table ---------- */
.tbl-wrap{overflow:auto;border-radius:14px;border:1px solid var(--stroke)}
table{width:100%;border-collapse:collapse;font-size:.88rem;min-width:640px}
th,td{padding:11px 12px;text-align:center;border-bottom:1px solid var(--stroke)}
th{background:var(--panel2);color:var(--muted);font-family:'Kanit';font-weight:500;font-size:.8rem;position:sticky;top:0}
td:first-child,th:first-child{text-align:left}
tbody tr:hover{background:rgba(63,208,255,.06)}
tr.total{font-weight:700;background:rgba(245,196,81,.08)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.74rem;font-weight:600}
.b-green{background:rgba(52,227,164,.16);color:var(--green)}
.b-red{background:rgba(255,90,110,.16);color:var(--red)}
.b-yellow{background:rgba(255,203,71,.16);color:#d99a00}
.pill-red{color:var(--red);font-weight:700}.pill-yellow{color:#d99a00;font-weight:700}

.foot{margin-top:26px;text-align:center;color:var(--muted);font-size:.82rem;line-height:1.7}
.foot img{height:42px;opacity:.9;margin-bottom:6px}

/* ---------- FX particle background ---------- */
#fx{position:fixed;inset:0;z-index:-1;opacity:.55;pointer-events:none}
[data-theme="light"] #fx{opacity:.22}

/* ---------- Live bar + ticker ---------- */
.livebar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}
.live-pill{display:inline-flex;gap:8px;align-items:center;font-family:'Kanit';font-size:.8rem;
  border:1px solid var(--stroke);border-radius:999px;padding:7px 14px;background:var(--panel2);white-space:nowrap}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:lpulse 1.6s infinite}
@keyframes lpulse{0%{box-shadow:0 0 0 0 rgba(255,90,110,.55)}70%{box-shadow:0 0 0 9px rgba(255,90,110,0)}100%{box-shadow:0 0 0 0 rgba(255,90,110,0)}}
.ticker{flex:1;min-width:240px;overflow:hidden;border:1px solid var(--stroke);border-radius:999px;
  background:var(--panel2);height:36px;display:flex;align-items:center}
.ticker .tk{display:inline-block;white-space:nowrap;padding-left:100%;animation:tkmove 30s linear infinite;font-size:.82rem;color:var(--muted)}
.ticker .tk b{color:var(--txt)} .ticker .tk .ok{color:var(--green)} .ticker .tk .bad{color:var(--red)}
@keyframes tkmove{to{transform:translateX(-100%)}}

/* ---------- Geo choropleth (ระดับตำบล) ---------- */
.mapmetrics{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 10px}
.mchip{font-family:'Kanit';font-size:.74rem;padding:5px 12px;border-radius:999px;cursor:pointer;
  border:1px solid var(--stroke);background:var(--panel2);color:var(--muted);transition:.18s}
.mchip:hover{color:var(--txt);transform:translateY(-1px)}
.mchip.on{background:linear-gradient(135deg,#3fd0ff,#1f9ed6);color:#022235;border-color:transparent;font-weight:600}
.geomap{position:relative}
.geomap svg{display:block;width:100%;max-height:560px;margin:0 auto}
.geomap .tb{stroke:rgba(234,241,255,.10);stroke-width:.8;cursor:pointer;transition:filter .15s}
.geomap .tb:hover{filter:brightness(1.4);stroke:rgba(234,241,255,.5);stroke-width:1.2}
[data-theme="light"] .geomap .tb{stroke:rgba(17,32,60,.18)}
.geomap .db{fill:none;stroke:rgba(234,241,255,.40);stroke-width:1.7;pointer-events:none;stroke-linejoin:round}
[data-theme="light"] .geomap .db{stroke:rgba(17,32,60,.45)}
.geomap .db.bad{stroke:var(--red);stroke-width:2.6;animation:dbp 1.8s infinite}
@keyframes dbp{0%,100%{stroke-opacity:1}50%{stroke-opacity:.35}}
.geomap .db.sel{stroke:var(--cyan);stroke-width:3.2;animation:none}
.geomap .lb{font-family:'Kanit';fill:#eaf1ff;paint-order:stroke;stroke:rgba(8,16,36,.85);stroke-width:3.5;pointer-events:none}
[data-theme="light"] .geomap .lb{fill:#11203c;stroke:rgba(255,255,255,.92)}
.geomap .lbv{font-weight:800}
.gtip{position:absolute;pointer-events:none;z-index:20;min-width:180px;display:none;
  background:rgba(10,20,40,.96);border:1px solid rgba(120,170,255,.35);border-radius:12px;
  padding:10px 13px;font-size:.8rem;box-shadow:0 12px 30px rgba(0,0,0,.45);color:#eaf1ff}
.gtip b{font-family:'Kanit';font-size:.88rem}
.gtip .trow{display:flex;justify-content:space-between;gap:16px;margin-top:4px}
.gtip .trow span:last-child{font-weight:700}
.gtip .hl{color:var(--cyan)}
.maplegend{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:.72rem;color:var(--muted)}
.maplegend .bar{flex:1;height:10px;border-radius:6px;border:1px solid var(--stroke)}

/* ---------- Radial gauge ---------- */
.gaugewrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:10px 0 4px}
.gauge{--p:0;width:190px;height:190px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--green) calc(var(--p)*1%), rgba(120,170,255,.12) 0);
  filter:drop-shadow(0 6px 22px rgba(52,227,164,.18))}
.gauge:before{content:"";position:absolute;inset:15px;border-radius:50%;background:var(--panel2)}
.gauge .gv{position:relative;font-family:'Kanit';font-weight:800;font-size:2.5rem;color:var(--green)}
.gauge .gv small{font-size:1.05rem;color:var(--muted);font-weight:500;margin-left:2px}
.gauge.lo{background:conic-gradient(var(--gold) calc(var(--p)*1%), rgba(120,170,255,.12) 0);
  filter:drop-shadow(0 6px 22px rgba(245,196,81,.18))}
.gauge.lo .gv{color:var(--gold)}
.gstats{display:flex;gap:22px}
.gstats div{text-align:center}
.gstats .n{font-family:'Kanit';font-weight:700;font-size:1.2rem}
.gstats .l{font-size:.7rem;color:var(--muted)}

/* ---------- Scroll reveal ---------- */
.rv{opacity:0;transform:translateY(16px);transition:.55s opacity,.55s transform}
.rv.in{opacity:1;transform:none}

/* ---------- Verdict sweeping edge ---------- */
.verdict:after{content:"";position:absolute;inset:-1px;border-radius:22px;padding:1px;pointer-events:none;
  background:linear-gradient(120deg,transparent 32%,rgba(63,208,255,.55),transparent 68%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  background-size:220% 100%;animation:vsweep 4.5s linear infinite}
@keyframes vsweep{to{background-position:-220% 0}}

@media (prefers-reduced-motion:reduce){
  .ticker .tk,.live-dot,.geomap .db.bad,.verdict:after{animation:none}
  .rv{opacity:1;transform:none;transition:none}
}
@media(max-width:700px){.geomap svg{max-height:440px}}

/* ---------- Presentation mode ---------- */
#present{position:fixed;inset:0;z-index:9999;display:none;background:
  radial-gradient(1200px 700px at 50% -10%,rgba(63,208,255,.22),transparent 60%),
  linear-gradient(160deg,#081024,#0c1c3a);color:#eaf1ff;overflow:hidden}
#present.on{display:block}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:5vh 6vw;opacity:0;transform:scale(.98);transition:.6s;pointer-events:none}
.slide.active{opacity:1;transform:scale(1);pointer-events:auto}
.slide .s-eyebrow{color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-size:1.1vw;font-family:'Kanit'}
.slide h2{font-family:'Kanit';font-weight:800;font-size:3.4vw;margin:14px 0;line-height:1.2}
.slide .s-big{font-family:'Kanit';font-weight:800;font-size:9vw;line-height:1;
  background:linear-gradient(135deg,#3fd0ff,#34e3a4);-webkit-background-clip:text;background-clip:text;color:transparent}
.slide .s-sub{color:#9fb4d8;font-size:1.5vw;margin-top:10px}
.p-kpis{display:flex;gap:3vw;margin-top:3vh;flex-wrap:wrap;justify-content:center}
.p-kpi{background:rgba(20,36,68,.6);border:1px solid rgba(120,170,255,.2);border-radius:22px;padding:3vh 3vw;min-width:16vw}
.p-kpi .n{font-family:'Kanit';font-weight:800;font-size:4vw;line-height:1}
.p-kpi .l{color:#9fb4d8;font-size:1.1vw;margin-top:8px}
.p-chart{width:74vw;height:58vh;margin-top:2vh}
.p-logos{position:absolute;top:4vh;left:4vw;display:flex;gap:14px;align-items:center}
.p-logos img{height:7vh}
.p-brand{position:absolute;top:4vh;right:4vw;text-align:right;font-family:'Kanit';font-size:1vw;color:#9fb4d8}
.p-ctrl{position:absolute;bottom:3vh;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;z-index:5}
.p-ctrl button{background:rgba(20,36,68,.8);border:1px solid rgba(120,170,255,.25);color:#eaf1ff;
  width:46px;height:46px;border-radius:50%;font-size:1.1rem;cursor:pointer}
.p-ctrl .exit{width:auto;border-radius:24px;padding:0 18px;font-family:'Kanit'}
.p-dots{display:flex;gap:8px}.p-dots i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer}
.p-dots i.on{background:var(--gold);width:26px;border-radius:6px}
.p-progress{position:absolute;top:0;left:0;height:4px;background:linear-gradient(90deg,#3fd0ff,#f5c451);width:0;transition:width .3s}

@media(max-width:1024px){.grid,.grid-map{grid-template-columns:1fr}.grid-map .mapcard{grid-row:auto}.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.brand-title{font-size:1.05rem}.kpi .k-num{font-size:1.7rem}.logos img{height:46px}}
@media print{body{background:#fff}.top-actions,.filters,.copybtn,#fx,.livebar,.mapmetrics{display:none}.card,.kpi,.top{box-shadow:none}.rv{opacity:1;transform:none}}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:14px;color:var(--muted)}
.spin{width:42px;height:42px;border:4px solid var(--stroke);border-top-color:var(--cyan);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="fx" aria-hidden="true"></canvas>
<div class="wrap" id="app">
  <div class="loading"><div class="spin"></div><div>กำลังเชื่อมต่อฐานข้อมูล…</div></div>
</div>

<!-- ===== Presentation overlay ===== -->
<div id="present">
  <div class="p-progress" id="pProg"></div>
  <div class="p-logos"><img src="province-seal.png" alt=""><img src="pok-logo.png" alt=""></div>
  <div class="p-brand">การป้องกันและปราบปรามผู้มีอิทธิพล<br>จังหวัดหนองบัวลำภู</div>
  <div id="slides"></div>
  <div class="p-ctrl">
    <button onclick="Present.prev()">‹</button>
    <div class="p-dots" id="pDots"></div>
    <button onclick="Present.toggle()" id="pPlay">⏸</button>
    <button onclick="Present.next()">›</button>
    <button class="exit" onclick="Present.stop()">✕ ออก</button>
  </div>
</div>

<script>
/* ===================== CONFIG ===================== */
// 🔵 วาง URL ของ Web App (ลงท้าย /exec) ที่ได้จากการ Deploy Apps Script ตรงนี้
const API = 'https://script.google.com/macros/s/AKfycbxrXSByL3_79MT_jCv_SvOC0oq6cENctJddm3jYBYA8LVaRERAedyQivHauScJPGmHy/exec';

const FISCAL_MONTHS=['ตุลาคม','พฤศจิกายน','ธันวาคม','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน'];
/* ปีงบประมาณไทยปัจจุบัน (เริ่ม 1 ต.ค.) — ใช้เลือกปีเริ่มต้นของแดชบอร์ด */
function currentThaiFY(){ const d=new Date(); let y=d.getFullYear()+543; if(d.getMonth()>=9) y+=1; return y; }
const DISTRICTS=['เมืองหนองบัวลำภู','ศรีบุญเรือง','นากลาง','โนนสัง','สุวรรณคูหา','นาวัง'];

/* ตัวอย่างข้อมูล (ใช้แสดงเมื่อยังไม่ตั้งค่า API) — ครบ 12 เดือน ปีงบปัจจุบัน ตามแผนปฏิบัติการ
   หมายเหตุ: ตัวกรองปีในแดชบอร์ดดึงจากข้อมูลจริง ปีงบใหม่จะปรากฏเองเมื่อมีการกรอกผ่านระบบ */
const DEMO_SEED={'เมืองหนองบัวลำภู':[0,2],'ศรีบุญเรือง':[0,0],'นากลาง':[0,2],'โนนสัง':[0,0],'สุวรรณคูหา':[1,0],'นาวัง':[0,2]};
const DEMO=(function(){
  const out=[];
  for(let mo=1;mo<=12;mo++){
    DISTRICTS.forEach(d=>{
      const [red,yellow]=DEMO_SEED[d]||[0,0];
      out.push({fiscalYear:2569,month:FISCAL_MONTHS[mo-1],monthOrder:mo,district:d,
        red,yellow,suppressed:red+yellow,remaining:0,targetPct:100,resultPct:100,
        complaints:0,patrols:0,operations:0,arrests:0,
        status:'ถอดถอนรายชื่อจากผู้มีอิทธิพลแล้ว',note:''});
    });
  }
  return out;
})();

let RAW=[], META=null, charts={};
const state={fy:null, month:'ALL', district:'ALL', demo:false, mapMetric:'watch'};

/* ===================== JSONP ===================== */
function jsonp(params){
  return new Promise((resolve,reject)=>{
    if(!API || API.indexOf('PASTE_')===0){ reject('no-api'); return; }
    const cb='cb_'+Math.random().toString(36).slice(2);
    const t=setTimeout(()=>{cleanup();reject('timeout');},15000);
    function cleanup(){ delete window[cb]; if(s.parentNode)s.parentNode.removeChild(s); clearTimeout(t); }
    window[cb]=(d)=>{cleanup();resolve(d);};
    const q=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    const s=document.createElement('script');
    s.src=API+'?'+q+'&callback='+cb;
    s.onerror=()=>{cleanup();reject('neterr');};
    document.body.appendChild(s);
  });
}

/* ===================== Load ===================== */
async function load(){
  try{
    const d=await jsonp({action:'read'});
    if(d&&d.ok){ RAW=d.rows; }
    else throw 'bad';
  }catch(e){
    RAW=DEMO.slice(); state.demo=true;
  }
  if(!RAW.length){ RAW=DEMO.slice(); state.demo=true; }
  const fys=[...new Set(RAW.map(r=>+r.fiscalYear))].sort((a,b)=>b-a);
  const cfy=currentThaiFY();
  state.fy = fys.includes(cfy) ? cfy : fys[0]; // เปิดมาที่ปีงบปัจจุบัน ถ้ามีข้อมูล
  render();
}

/* ===================== Helpers ===================== */
function filtered(){
  return RAW.filter(r=>+r.fiscalYear===+state.fy)
    .filter(r=> state.month==='ALL' ? true : r.month===state.month)
    .filter(r=> state.district==='ALL' ? true : r.district===state.district);
}
// ใช้ snapshot ล่าสุด (เดือนสูงสุด) ของแต่ละอำเภอ เมื่อเลือก "ทุกเดือน"
function latestPerDistrict(rows){
  const m={};
  rows.forEach(r=>{ const k=r.district; if(!m[k]||+r.monthOrder>+m[k].monthOrder) m[k]=r; });
  return DISTRICTS.filter(d=>m[d]).map(d=>m[d]);
}
function activeRows(){
  const f=filtered();
  return state.month==='ALL' ? latestPerDistrict(f) : f;
}
const sum=(a,k)=>a.reduce((s,r)=>s+(+r[k]||0),0);
const fmt=n=>(+n||0).toLocaleString('th-TH');

function monthsForFy(){
  const ms=[...new Set(RAW.filter(r=>+r.fiscalYear===+state.fy).map(r=>r.month))];
  return FISCAL_MONTHS.filter(m=>ms.includes(m));
}
function kpi(cls,label,num,unit,tag){
  return `<div class="kpi ${cls}"><div class="klabel">${label}</div>
    <div class="k-num" data-cv="${+num||0}">0<span class="kunit">${unit}</span></div><div class="ktag">${tag}</div></div>`;
}
function verdictHTML(remain,supp,result,red,yellow){
  let cls='', main='', sub='';
  if(remain===0){
    cls=''; main=`ปัจจุบันจังหวัดหนองบัวลำภู <b>ไม่มีผู้มีอิทธิพลคงเหลือ</b> ในพื้นที่`;
    sub=`ดำเนินการปราบปราม/ถอดถอนบัญชีเฝ้าระวังแล้ว ${fmt(supp)} ราย • ผลการดำเนินการเฉลี่ย ${result}% — คงการเฝ้าระวังอย่างต่อเนื่อง`;
  }else if(remain<=2){
    cls='warn'; main=`มีผู้มีอิทธิพลคงเหลือ <b>${fmt(remain)} ราย</b> อยู่ระหว่างดำเนินการ`;
    sub=`เร่งรัดตามมาตรการตัดวงจรอิทธิพล • ปราบปรามแล้ว ${fmt(supp)} ราย • ผลการดำเนินการ ${result}%`;
  }else{
    cls='alert'; main=`เฝ้าระวังพิเศษ — คงเหลือ <b>${fmt(remain)} ราย</b>`;
    sub=`ต้องบูรณาการกำลังฝ่ายปกครอง ตำรวจ และความมั่นคงโดยเร่งด่วน`;
  }
  return `<div class="verdict ${cls}">
    <div class="vlabel">บทสรุปผู้บริหาร • ${monthLabel()}</div>
    <div class="vmain">${main}</div><div class="vsub">${sub}</div>
    <button class="btn copybtn" onclick="copyVerdict()">⧉ คัดลอกสรุป</button></div>`;
}
function monthLabel(){ return state.month==='ALL'?`ข้อมูลล่าสุด ปีงบ ${state.fy}`:`${state.month} ปีงบ ${state.fy}`; }
function copyVerdict(){
  const r=activeRows();
  const txt=`📌 สรุปสถานการณ์ผู้มีอิทธิพล จ.หนองบัวลำภู (${monthLabel()})\n`+
    `• คงเหลือปัจจุบัน: ${fmt(sum(r,'remaining'))} ราย\n`+
    `• ปราบปราม/ถอดถอนแล้ว: ${fmt(sum(r,'suppressed'))} ราย\n`+
    `• ระดับสีแดง ${fmt(sum(r,'red'))} ราย / สีเหลือง ${fmt(sum(r,'yellow'))} ราย\n`+
    `• ผลการดำเนินการเฉลี่ย: ${r.length?Math.round(sum(r,'resultPct')/r.length):0}%`;
  navigator.clipboard.writeText(txt).then(()=>toast('คัดลอกสรุปแล้ว — พร้อมส่งเข้ากลุ่มไลน์'));
}

function tableHTML(rows,tr,ty,ts,trem){
  const map={}; rows.forEach(r=>map[r.district]=r);
  let body=DISTRICTS.map((d,i)=>{
    const r=map[d]||{red:0,yellow:0,suppressed:0,remaining:0,targetPct:0,resultPct:0,status:'-'};
    return `<tr>
      <td>${i+1}. ${d}</td>
      <td>${r.red?`<span class="pill-red">${r.red}</span>`:'-'}</td>
      <td>${r.yellow?`<span class="pill-yellow">${r.yellow}</span>`:'-'}</td>
      <td>${fmt(r.suppressed)}</td>
      <td>${r.remaining>0?`<span class="badge b-red">${r.remaining}</span>`:`<span class="badge b-green">0</span>`}</td>
      <td>${fmt(r.resultPct)}%</td>
      <td style="text-align:left;font-size:.82rem">${r.status||'-'}</td></tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>อำเภอ</th><th>สีแดง</th><th>สีเหลือง</th><th>ปราบปราม/ถอดถอน</th>
    <th>คงเหลือ</th><th>ผลดำเนินการ</th><th>ผลการดำเนินงาน</th></tr></thead>
    <tbody>${body}
    <tr class="total"><td>รวมทั้งจังหวัด</td><td>${fmt(tr)}</td><td>${fmt(ty)}</td>
    <td>${fmt(ts)}</td><td>${trem>0?`<span class="badge b-red">${fmt(trem)}</span>`:`<span class="badge b-green">0</span>`}</td>
    <td>-</td><td style="text-align:left">ปัจจุบันผู้มีอิทธิพลคงเหลือ ${fmt(trem)} ราย</td></tr>
    </tbody></table>`;
}

/* ===================== Charts ===================== */
function gridColor(){return getComputedStyle(document.body).getPropertyValue('--stroke');}
function txtColor(){return getComputedStyle(document.body).getPropertyValue('--muted');}
function destroy(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function drawCharts(rows){
  destroy();
  Chart.defaults.font.family="'Sarabun','Kanit',sans-serif";
  Chart.defaults.color=txtColor();
  const map={}; rows.forEach(r=>map[r.district]=r);
  const labels=DISTRICTS;
  const red=labels.map(d=>map[d]?+map[d].red:0);
  const yellow=labels.map(d=>map[d]?+map[d].yellow:0);

  charts.district=new Chart(document.getElementById('cDistrict'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'สีแดง (ผู้มีอิทธิพล)',data:red,backgroundColor:'#ff5a6e',borderRadius:6,stack:'s'},
      {label:'สีเหลือง (เฝ้าระวัง)',data:yellow,backgroundColor:'#ffcb47',borderRadius:6,stack:'s'}
    ]},
    options:baseOpt({stacked:true})
  });

  const tr=sum(rows,'red'),ty=sum(rows,'yellow'),ts=sum(rows,'suppressed'),trem=sum(rows,'remaining');
  const dData=(ts||trem)?[ts||0,trem||0]:[1,0];
  const dLabels=(ts||trem)?['ดำเนินการ/ถอดถอนแล้ว','คงเหลือในพื้นที่']:['ไม่อยู่ในบัญชีเฝ้าระวัง','คงเหลือในพื้นที่'];
  charts.donut=new Chart(document.getElementById('cDonut'),{
    type:'doughnut',
    data:{labels:dLabels,
      datasets:[{data:dData,
        backgroundColor:['#34e3a4','#ff5a6e'],borderWidth:0,hoverOffset:6}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:14}},
      tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.parsed)+' ราย'}}},cutout:'64%'}
  });

  // แนวโน้มรายเดือน (ทั้งจังหวัด)
  const fyRows=RAW.filter(r=>+r.fiscalYear===+state.fy);
  const trendLabels=monthsForFy().length?monthsForFy():[FISCAL_MONTHS[7]];
  const remainByMonth=trendLabels.map(m=>sum(fyRows.filter(r=>r.month===m),'remaining'));
  const suppByMonth=trendLabels.map(m=>sum(fyRows.filter(r=>r.month===m),'suppressed'));
  charts.trend=new Chart(document.getElementById('cTrend'),{
    type:'line',
    data:{labels:trendLabels,datasets:[
      {label:'คงเหลือ',data:remainByMonth,borderColor:'#3fd0ff',backgroundColor:'rgba(63,208,255,.15)',fill:true,tension:.35,borderWidth:3,pointRadius:4},
      {label:'ปราบปราม/ถอดถอนสะสม',data:suppByMonth,borderColor:'#34e3a4',backgroundColor:'rgba(52,227,164,.10)',fill:true,tension:.35,borderWidth:2,pointRadius:3}
    ]},
    options:baseOpt({})
  });

  charts.ops=new Chart(document.getElementById('cOps'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'รับแจ้งเบาะแส',data:labels.map(d=>map[d]?+map[d].complaints:0),backgroundColor:'#3fd0ff',borderRadius:5},
      {label:'ลงพื้นที่เฝ้าระวัง',data:labels.map(d=>map[d]?+map[d].patrols:0),backgroundColor:'#f5c451',borderRadius:5},
      {label:'ปฏิบัติการปราบปราม',data:labels.map(d=>map[d]?+map[d].operations:0),backgroundColor:'#a78bfa',borderRadius:5},
      {label:'จับกุม/ดำเนินคดี',data:labels.map(d=>map[d]?+map[d].arrests:0),backgroundColor:'#ff5a6e',borderRadius:5}
    ]},
    options:baseOpt({})
  });
}
function baseOpt(o){
  return {responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:14}}},
    scales:{
      x:{stacked:!!o.stacked,grid:{display:false},ticks:{font:{size:11}}},
      y:{stacked:!!o.stacked,beginAtZero:true,grid:{color:gridColor()},ticks:{precision:0}}
    }};
}

/* ===================== Export / theme / toast ===================== */
function exportCSV(){
  const rows=RAW.filter(r=>+r.fiscalYear===+state.fy);
  const cols=['fiscalYear','month','monthOrder','district','red','yellow','suppressed','remaining','targetPct','resultPct','complaints','patrols','operations','arrests','status','note'];
  const head=['ปีงบ','เดือน','ลำดับเดือน','อำเภอ','สีแดง','สีเหลือง','ปราบปราม','คงเหลือ','เป้าหมาย%','ผล%','รับแจ้ง','ลงพื้นที่','ปฏิบัติการ','จับกุม','สถานะ','หมายเหตุ'];
  let csv='\ufeff'+head.join(',')+'\n';
  rows.forEach(r=>{csv+=cols.map(c=>`"${String(r[c]==null?'':r[c]).replace(/"/g,'""')}"`).join(',')+'\n';});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));

const Present={
  i:0, timer:null, playing:true, slides:[],
  start(){
    this.build(); document.getElementById('present').classList.add('on');
    this.i=0; this.playing=true; this.show(0); this.play();
    document.onkeydown=(e)=>{ if(!document.getElementById('present').classList.contains('on'))return;
      if(e.key==='ArrowRight')this.next(); if(e.key==='ArrowLeft')this.prev();
      if(e.key==='Escape')this.stop(); if(e.key===' '){e.preventDefault();this.toggle();}};
  },
  stop(){document.getElementById('present').classList.remove('on');clearInterval(this.timer);
    Object.values(this._charts||{}).forEach(c=>{try{c.destroy()}catch(e){}});},
  build(){
    const rows=activeRows();
    const tRed=sum(rows,'red'),tYel=sum(rows,'yellow'),tSup=sum(rows,'suppressed'),
          tRem=sum(rows,'remaining'),res=rows.length?Math.round(sum(rows,'resultPct')/rows.length):0;
    const S=[];
    // Slide 1 — title
    S.push(`<div class="slide"><div class="s-eyebrow">แผนปฏิบัติการ ปีงบประมาณ ${state.fy}</div>

    // Slide 2 — headline number
    S.push(`<div class="slide"><div class="s-eyebrow">สถานะปัจจุบัน</div>
      <div class="s-big">${fmt(tRem)}</div>
      <h2>ผู้มีอิทธิพลคงเหลือในพื้นที่ (ราย)</h2>
      <div class="s-sub">${tRem===0?'จังหวัดดำเนินการจัดการบัญชีเฝ้าระวังครบถ้วน — คงการเฝ้าระวังต่อเนื่อง':'อยู่ระหว่างเร่งรัดตามมาตรการตัดวงจรอิทธิพล'}</div></div>`);
    // Slide 3 — KPI grid
    S.push(`<div class="slide"><div class="s-eyebrow">ตัวชี้วัดหลัก</div><h2>ภาพรวมการดำเนินงาน</h2>
      <div class="p-kpis">
        <div class="p-kpi"><div class="n" style="color:#34e3a4">${fmt(tSup)}</div><div class="l">ปราบปราม/ถอดถอนแล้ว</div></div>
        <div class="p-kpi"><div class="n" style="color:#ff5a6e">${fmt(tRed)}</div><div class="l">ระดับสีแดง</div></div>
        <div class="p-kpi"><div class="n" style="color:#ffcb47">${fmt(tYel)}</div><div class="l">ระดับสีเหลือง</div></div>

      </div></div>`);

    S.push(`<div class="slide"><div class="s-eyebrow">เปรียบเทียบรายอำเภอ</div><h2>บัญชีเฝ้าระวังแยกรายอำเภอ</h2>
      <div class="p-chart"><canvas id="pcDist"></canvas></div></div>`);

    document.getElementById('pDots').innerHTML=S.map((_,i)=>`<i onclick="Present.show(${i})"></i>`).join('');
    this.slides=[...document.querySelectorAll('#slides .slide')];
    // build chart for slide 4
    setTimeout(()=>{
      const map={};rows.forEach(r=>map[r.district]=r);
      this._charts={};
      this._charts.dist=new Chart(document.getElementById('pcDist'),{
        type:'bar',
        data:{labels:DISTRICTS,datasets:[
          {label:'สีแดง',data:DISTRICTS.map(d=>map[d]?+map[d].red:0),backgroundColor:'#ff5a6e',borderRadius:8,stack:'s'},
          {label:'สีเหลือง',data:DISTRICTS.map(d=>map[d]?+map[d].yellow:0),backgroundColor:'#ffcb47',borderRadius:8,stack:'s'},
          {label:'ถอดถอนแล้ว',data:DISTRICTS.map(d=>map[d]?+map[d].suppressed:0),backgroundColor:'#34e3a4',borderRadius:8,stack:'s2'}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{color:'#cfe0ff',font:{size:16}}}},
          scales:{x:{stacked:true,ticks:{color:'#cfe0ff',font:{size:15}},grid:{display:false}},
                  y:{stacked:true,beginAtZero:true,ticks:{color:'#9fb4d8',precision:0},grid:{color:'rgba(120,170,255,.12)'}}}}
      });
    },120);
  },
  show(i){
    this.i=(i+this.slides.length)%this.slides.length;
    this.slides.forEach((s,k)=>s.classList.toggle('active',k===this.i));
    [...document.querySelectorAll('#pDots i')].forEach((d,k)=>d.classList.toggle('on',k===this.i));
    document.getElementById('pProg').style.width=((this.i+1)/this.slides.length*100)+'%';
  },
  next(){this.show(this.i+1);this.play();},
  prev(){this.show(this.i-1);this.play();},
  play(){clearInterval(this.timer); if(!this.playing)return;
    this.timer=setInterval(()=>this.show(this.i+1),6000);},
  toggle(){this.playing=!this.playing;document.getElementById('pPlay').textContent=this.playing?'⏸':'▶';this.play();}
};

const MAP_METRICS=[
  {k:'watch',    label:'เฝ้าระวังสะสม',    calc:r=>(+r.red||0)+(+r.yellow||0), ramp:'threat'},
  {k:'red',      label:'สีแดง',            calc:r=>+r.red||0,                  ramp:'threat'},

  {k:'remaining',label:'คงเหลือ',          calc:r=>+r.remaining||0,            ramp:'threat'}
];
const RAMPS={threat:['#152c55','#f5c451','#ff5a6e'], good:['#152c55','#2bb3d8','#34e3a4']};
const SHORT={'เมืองหนองบัวลำภู':'เมือง'};

function hex2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function mix(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
function rampColor(t,ramp){
  const [s0,s1,s2]=RAMPS[ramp].map(hex2rgb);
  const c=t<=.5?mix(s0,s1,t*2):mix(s1,s2,(t-.5)*2);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
let GEO_CACHE=null;
function geoVals(rows){
  const m={}; rows.forEach(r=>m[r.district]=r);
  const M=MAP_METRICS.find(x=>x.k===state.mapMetric)||MAP_METRICS[0];
  const vals={}; DISTRICTS.forEach(d=>vals[d]=m[d]?M.calc(m[d]):0);
  const max=Math.max(1,...Object.values(vals));
  GEO_CACHE={m,vals,max,M};
  return GEO_CACHE;
}
function ringPath(f,close){
  let s='M'+f[0]+' '+f[1];
  for(let i=2;i<f.length;i+=2)s+='L'+f[i]+' '+f[i+1];
  return close?s+'Z':s;
}
function geoSVG(rows){
  const {m,vals,max,M}=geoVals(rows);
  const tb=GEO_TB.map(t=>{
    const v=vals[t.d]||0;
    const fill=rampColor(v/max,M.ramp);
    return `<path class="tb" d="${t.r.map(r=>ringPath(r,true)).join('')}" fill="${fill}" fill-rule="evenodd" data-t="${t.n}" data-d="${t.d}"></path>`;
  }).join('');
  const db=DISTRICTS.map(dn=>{
    const r=m[dn]||{}; const bad=(+r.remaining||0)>0;
    return `<path class="db ${bad?'bad':''} ${state.district===dn?'sel':''}" d="${(GEO_DB[dn]||[]).map(f=>ringPath(f,false)).join('')}"></path>`;
  }).join('');
  const lb=DISTRICTS.map(dn=>{
    const p=GEO_DL[dn]; if(!p)return '';
    return `<text class="lb" x="${p[0]}" y="${p[1]}" text-anchor="middle" font-size="22">${SHORT[dn]||dn}</text>
      <text class="lb lbv" x="${p[0]}" y="${p[1]+25}" text-anchor="middle" font-size="24">${fmt(vals[dn]||0)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${GEO_W} ${GEO_H}" xmlns="http://www.w3.org/2000/svg">${tb}${db}${lb}</svg>`;
}
function metricChips(){
  return `<div class="mapmetrics">${MAP_METRICS.map(x=>
    `<span class="mchip ${state.mapMetric===x.k?'on':''}" onclick="setMapMetric('${x.k}')">${x.label}</span>`).join('')}</div>`;
}
function legendHTML(){
  const {max,M}=GEO_CACHE;
  const g=`linear-gradient(90deg,${RAMPS[M.ramp].join(',')})`;
  return `<div class="maplegend"><span>0</span><div class="bar" style="background:${g}"></div><span>${fmt(max)} ราย</span><span>• ${M.label}</span></div>`;
}
function mapBlockHTML(rows){
  return metricChips()+`<div class="geomap" id="geomap">${geoSVG(rows)}<div class="gtip" id="gtip"></div></div>`+legendHTML();
}
function setMapMetric(k){
  state.mapMetric=k;

function initGeoEvents(){
  const gm=document.getElementById('geomap'), tip=document.getElementById('gtip');
  if(!gm||!tip)return;
  gm.onmouseover=e=>{
    const p=e.target.closest('.tb'); if(!p)return;
    const d=p.dataset.d, t=p.dataset.t, r=(GEO_CACHE.m[d])||{};
    const M=GEO_CACHE.M, v=GEO_CACHE.vals[d]||0;
    tip.innerHTML=`<b>ต.${t}</b><div style="color:#9fb4d8;font-size:.74rem;margin-top:1px">อ.${d}</div>
      <div class="trow hl"><span>${M.label}</span><span>${fmt(v)} ราย</span></div>
      <div class="trow"><span>สีแดง</span><span style="color:var(--red)">${fmt(r.red||0)}</span></div>
      <div class="trow"><span>สีเหลือง</span><span style="color:#ffcb47">${fmt(r.yellow||0)}</span></div>
      <div class="trow"><span>ปราบปราม/ถอดถอน</span><span style="color:var(--green)">${fmt(r.suppressed||0)}</span></div>
      <div class="trow"><span>คงเหลือ</span><span style="color:${(+r.remaining||0)>0?'var(--red)':'var(--green)'}">${fmt(r.remaining||0)}</span></div>
      <div class="trow"><span>ผลการดำเนินการ</span><span>${fmt(r.resultPct||0)}%</span></div>`;
    tip.style.display='block';
  };
  gm.onmousemove=e=>{
    const rect=gm.getBoundingClientRect();
    let x=e.clientX-rect.left+16, y=e.clientY-rect.top+16;
    if(x+200>rect.width)x=e.clientX-rect.left-210;
    if(y+180>rect.height)y=e.clientY-rect.top-150;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  };
  gm.onmouseleave=()=>{tip.style.display='none';};
  gm.onclick=e=>{
    const p=e.target.closest('.tb'); if(p)pickDistrict(p.dataset.d);
  };
}
function pickDistrict(d){ state.district = (state.district===d?'ALL':d); render(); }

function postRender(avgResult){
  /* เผยการ์ดตอนเลื่อนถึง */
  const els=document.querySelectorAll('.card,.kpi,.verdict,.livebar');
  if(!REDUCE && 'IntersectionObserver' in window){
    const io=new IntersectionObserver(es=>es.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1});
    els.forEach(el=>{el.classList.add('rv');io.observe(el);});
  }else{
    els.forEach(el=>{el.classList.add('rv','in');});
  }
  /* ตัวเลขนับขึ้น */
  document.querySelectorAll('.k-num[data-cv]').forEach(el=>countUp(el,+el.dataset.cv));
  /* มาตรวัด */
  animGauge(avgResult);
  /* ตัววิ่งสถานะ */
  buildTicker();
  /* แผนที่: tooltip + คลิกกรอง */
  initGeoEvents();
}
function countUp(el,target){
  if(REDUCE){el.firstChild.nodeValue=fmt(target);return;}
  const t0=performance.now(),dur=900;
  (function step(t){
    const p=Math.min(1,(t-t0)/dur), v=Math.round(target*(1-Math.pow(1-p,3)));
    el.firstChild.nodeValue=fmt(v);
    if(p<1)requestAnimationFrame(step);
  })(t0);
}
function animGauge(v){
  const g=document.getElementById('gauge'), gv=document.getElementById('gv');
  if(!g||!gv)return;
  g.classList.toggle('lo', v<100);
  if(REDUCE){g.style.setProperty('--p',v);gv.textContent=v;return;}
  const t0=performance.now(),dur=1100;
  (function step(t){
    const p=Math.min(1,(t-t0)/dur), val=Math.round(v*(1-Math.pow(1-p,3)));
    g.style.setProperty('--p',val); gv.textContent=val;
    if(p<1)requestAnimationFrame(step);
  })(t0);
}
function buildTicker(){
  const el=document.getElementById('tk'); if(!el)return;
  const rows=activeRows(); const map={}; rows.forEach(r=>map[r.district]=r);
  const parts=DISTRICTS.map(d=>{
    const r=map[d]||{remaining:0};
    return `<b>${d}</b> ${+r.remaining>0
      ?`<span class="bad">คงเหลือ ${fmt(r.remaining)} ราย</span>`
      :`<span class="ok">✓ ไม่มีผู้มีอิทธิพลคงเหลือ</span>`}`;
  });
  parts.push(`<b>ทั้งจังหวัด</b> ปราบปราม/ถอดถอนสะสม ${fmt(sum(rows,'suppressed'))} ราย`);
  parts.push(`<b>ผลการดำเนินการ</b> เฉลี่ย ${rows.length?Math.round(sum(rows,'resultPct')/rows.length):0}%`);
  el.innerHTML=parts.join('&nbsp;&nbsp;&nbsp;•&nbsp;&nbsp;&nbsp;');
}

/* นาฬิกาไทย + นับถอยหลังรีเฟรชอัตโนมัติ (5 นาที) */
let refLeft=300;
setInterval(()=>{
  const c=document.getElementById('clock');
  if(c){const d=new Date();
    c.textContent=d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' น. • '
      +d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});}
  const rc=document.getElementById('refCount');
  if(rc){
    refLeft--;
    if(refLeft<=0){
      refLeft=300;
      const presenting=document.getElementById('present').classList.contains('on');
      if(!state.demo && !presenting) load();   // ดึงข้อมูลใหม่เฉพาะเมื่อเชื่อม API แล้ว
    }
    rc.textContent=Math.floor(refLeft/60)+':'+String(refLeft%60).padStart(2,'0');
  }
},1000);

/* พื้นหลังอนุภาคเชื่อมโยง (constellation) — ปิดอัตโนมัติเมื่อผู้ใช้ลดการเคลื่อนไหว */
(function fx(){
  const cv=document.getElementById('fx'); if(!cv)return;
  if(REDUCE){cv.remove();return;}
  const ctx=cv.getContext('2d'); let W,H,ps=[];
  function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  size(); addEventListener('resize',size);
  const N=Math.min(70,Math.floor(innerWidth*innerHeight/26000));
  for(let i=0;i<N;i++)ps.push({x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.6+.4});
  (function loop(){
    ctx.clearRect(0,0,W,H);
    const light=document.body.getAttribute('data-theme')==='light';
    ctx.fillStyle=light?'rgba(30,80,160,.5)':'rgba(140,200,255,.6)';
    ps.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();
    });
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){
      const a=ps[i],b=ps[j],dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
      if(d2<16900){
        ctx.strokeStyle=(light?'rgba(30,80,160,':'rgba(120,180,255,')+(0.16*(1-d2/16900))+')';
        ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
    requestAnimationFrame(loop);
  })();
})();

/* ===================== boot ===================== */
load();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
